<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>알림 내역 — Stalker Bot</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0f1117; color:#e0e0e0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }
    header { display:flex; align-items:center; gap:12px; padding:14px 24px; background:#1a1d27; border-bottom:1px solid #2a2d3a; }
    .back-btn { color:#7dd3fc; text-decoration:none; font-size:0.85rem; }
    .back-btn:hover { text-decoration:underline; }
    h1 { font-size:1rem; font-weight:600; color:#fff; }
    main { max-width:720px; margin:32px auto; padding:0 24px; }
    .list { background:#16213e; border:1px solid #1e3a5f; border-radius:12px; overflow:hidden; }
    .list-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:13px 18px; border-bottom:1px solid #1a1d28;
    }
    .list-item:last-child { border-bottom:none; }
    .item-left { display:flex; align-items:center; gap:12px; }
    .side-badge {
      display:inline-flex; align-items:center; justify-content:center;
      width:36px; height:36px; border-radius:8px; font-size:1rem;
    }
    .side-upper { background:#14532d; }
    .side-lower { background:#7f1d1d; }
    .item-name { font-size:0.9rem; font-weight:600; color:#fff; }
    .item-meta { font-size:0.75rem; color:#555; margin-top:2px; }
    .time { font-size:0.8rem; color:#555; white-space:nowrap; }
    .empty { text-align:center; padding:60px; color:#555; }
    .empty p { margin-bottom:6px; font-size:0.9rem; }
    .empty small { font-size:0.8rem; }
    .loading { text-align:center; padding:48px; color:#555; }
    .count-badge { font-size:0.8rem; color:#555; margin-left:auto; }
  </style>
</head>
<body>
<header>
  <a href="/dashboard" class="back-btn">← 대시보드</a>
  <h1>🔔 알림 내역</h1>
  <span class="count-badge" id="count"></span>
</header>
<main>
  <div id="list-wrap"><div class="loading">불러오는 중…</div></div>
</main>
<script>
const fmt = ts => {
  if (!ts) return '-';
  return new Date(ts * 1000).toLocaleString('ko-KR', {
    month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', hour12:false
  });
};

const STOCK_NAMES = {
  '005930':'삼성전자','000660':'SK하이닉스','035720':'카카오',
  '035420':'NAVER','005380':'현대차','000270':'기아',
  '051910':'LG화학','006400':'삼성SDI'
};

async function load() {
  const res = await fetch('/api/me/alerts');
  if (!res.ok) { location.href = '/login'; return; }
  const alerts = await res.json();

  document.getElementById('count').textContent = `총 ${alerts.length}건`;

  const wrap = document.getElementById('list-wrap');
  if (!alerts.length) {
    wrap.innerHTML = `<div class="list"><div class="empty">
      <p>아직 알림이 발동된 적이 없습니다.</p>
      <small>채널이 추세선에 닿으면 알림이 발동됩니다.</small>
    </div></div>`;
    return;
  }

  wrap.innerHTML = `<div class="list">${alerts.map(a => {
    const name = STOCK_NAMES[a.stock_code] || a.stock_code;
    const isUpper = a.side === 'upper';
    return `<div class="list-item">
      <div class="item-left">
        <div class="side-badge ${isUpper ? 'side-upper' : 'side-lower'}">
          ${isUpper ? '📈' : '📉'}
        </div>
        <div>
          <div class="item-name">${name} (${a.stock_code})</div>
          <div class="item-meta">${isUpper ? '상단 채널 돌파' : '하단 채널 이탈'} · ${a.channel_type}</div>
        </div>
      </div>
      <div class="time">${fmt(a.fired_at)}</div>
    </div>`;
  }).join('')}</div>`;
}

load();
</script>
</body>
</html>

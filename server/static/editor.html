<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채널 에디터</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e2329; color: #e0e0e0;
      font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
      height: 100vh; display: flex; flex-direction: column; user-select: none;
    }
    #toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; background: #252c35;
      border-bottom: 1px solid #2a3040; flex-shrink: 0;
    }
    #stock-title { font-weight: bold; font-size: 15px; color: #fff; margin-right: 4px; }
    button {
      padding: 5px 12px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 13px; font-weight: bold; transition: opacity .15s;
    }
    button:hover:not(:disabled) { opacity: .82; }
    #btn-draw  { background: #2196F3; color: #fff; }
    #btn-draw.active { background: #f44336; }
    #btn-save  { background: #4caf50; color: #fff; }
    #btn-save:disabled, #btn-reset:disabled { background: #333; color: #666; cursor: not-allowed; }
    #btn-reset { background: #3a3f4b; color: #ccc; }
    #btn-magnet {
      background: #3a3f4b; color: #ccc; border: 1px solid #555;
      min-width: 32px;
    }
    #btn-magnet.on { background: #ffc107; color: #111; border-color: #ffc107; }
    #help-btn { background: #3a3f4b; color: #888; font-size: 12px; padding: 4px 8px; }
    #status { margin-left: auto; font-size: 12px; color: #aaa; white-space: nowrap; max-width: 400px; overflow: hidden; text-overflow: ellipsis; }

    #chart-wrapper { position: relative; flex: 1; min-height: 0; }
    #chart { width: 100%; height: 100%; }
    #overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    #panel { flex-shrink: 0; background: #1a1f26; border-top: 1px solid #2a3040; max-height: 180px; overflow-y: auto; }
    #panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; background: #20262e; font-size: 12px; font-weight: bold;
      color: #888; cursor: pointer; position: sticky; top: 0;
    }
    #panel-header:hover { color: #bbb; }
    #help-box {
      background: #1e2836; padding: 8px 14px; font-size: 11px; color: #7a8a9a;
      border-bottom: 1px solid #2a3040; line-height: 1.8; display: none;
    }
    #help-box.show { display: block; }
    #help-box b { color: #4fc3f7; }
    #channel-list { padding: 4px 0; }
    .ch-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px; font-size: 12px; border-bottom: 1px solid #232930; }
    .ch-item:hover { background: #252c35; }
    .ch-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .ch-info { flex: 1; color: #bbb; }
    .ch-info span { color: #888; font-size: 11px; margin-left: 6px; }
    .ch-del { background: transparent; border: 1px solid #c0392b; color: #c0392b; padding: 2px 8px; font-size: 11px; border-radius: 3px; cursor: pointer; }
    .ch-del:hover { background: #c0392b; color: #fff; }
    #panel-empty { padding: 12px 14px; font-size: 12px; color: #555; }
  </style>
</head>
<body>

<div id="toolbar">
  <span id="stock-title">로딩 중…</span>
  <button id="btn-draw">채널 그리기</button>
  <button id="btn-save" disabled>저장</button>
  <button id="btn-reset" disabled>초기화</button>
  <button id="btn-magnet" title="마그넷 (Win: Ctrl / Mac: ⌘)">🧲</button>
  <button id="help-btn" onclick="toggleHelp()">?</button>
  <span id="status">차트를 불러오는 중…</span>
</div>

<div id="chart-wrapper">
  <div id="chart"></div>
  <canvas id="overlay"></canvas>
</div>

<div id="panel">
  <div id="panel-header" onclick="togglePanel()">
    <span>📋 저장된 채널 <span id="ch-count" style="color:#4fc3f7"></span></span>
    <span id="panel-arrow">▲</span>
  </div>
  <div id="panel-body">
    <div id="help-box">
      <b>채널 그리기</b>: [채널 그리기] 클릭 → P1 클릭 → P2 클릭 → 마우스 이동으로 하단 채널 설정 → 클릭 확정 → [저장]<br>
      <b>채널 수정</b>: 저장된 채널의 P1/P2 점(●)에 마우스를 올리면 노란 점이 나타납니다. 클릭하면 이동 모드 진입 → 원하는 위치 클릭으로 확정. ESC로 취소.<br>
      <b>마그넷</b>: 🧲 버튼 또는 <b>Win: Ctrl / Mac: ⌘(Cmd)</b> 을 누른 채 클릭하면 가장 가까운 고가·저가·시가·종가에 자동 스냅됩니다.
    </div>
    <div id="channel-list"></div>
    <div id="panel-empty" style="display:none">저장된 채널이 없습니다.</div>
  </div>
</div>

<script>
// ── 파라미터 ─────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const TOKEN  = params.get('token') ?? '';
const CODE   = params.get('code')  ?? '';

// 플랫폼 감지 (Mac: Meta/Cmd, 그 외: Ctrl)
const isMac = /Mac|iPhone|iPad|iPod/.test(navigator.platform || navigator.userAgent);

// ── DOM ──────────────────────────────────────────────────────────────────
const btnDraw   = document.getElementById('btn-draw');
const btnSave   = document.getElementById('btn-save');
const btnReset  = document.getElementById('btn-reset');
const btnMagnet = document.getElementById('btn-magnet');
const statusEl  = document.getElementById('status');
const titleEl   = document.getElementById('stock-title');
const wrapper   = document.getElementById('chart-wrapper');
const canvas    = document.getElementById('overlay');
const ctx       = canvas.getContext('2d');
const chList    = document.getElementById('channel-list');
const chCount   = document.getElementById('ch-count');
const panelEmpty= document.getElementById('panel-empty');

// ── 상태 ─────────────────────────────────────────────────────────────────
let state   = 'idle'; // 'idle'|'p1'|'p2'|'offset'|'done'|'edit_point'
let p1      = null;   // {time, price}
let p2      = null;
let offsetY = 0;

// 마그넷
let magnetOn    = false;
let snapPoint   = null; // {time, price, label:'H'|'L'|'O'|'C'} — 현재 스냅 위치

// 드로잉 미리보기
let cursorPos = null; // {time, price} — 실제 찍힐 위치 (스냅 or 원래)
let lastPxPos = null; // {x, y}        — 마지막 raw 픽셀 좌표 (offset 미리보기용)
let lastCrosshairParam = null; // 마지막 crosshair 파라미터 (Cmd 즉시 스냅 재계산용)

// 편집
let hoverInfo  = null; // {idx, point:'p1'|'p2', ch}
let editTarget = null; // {idx, point:'p1'|'p2'}
let editPreview= null; // {time, price} 편집 중 이동 미리보기

let savedChannels = [];
let ohlcvData     = {}; // {"YYYY-MM-DD": {open,high,low,close}}

const PALETTE = ['#4fc3f7','#81c784','#ffb74d','#f06292','#ce93d8','#80cbc4'];
const HIT_PX  = 12;

// ── 마그넷 키 + 버튼 ──────────────────────────────────────────────────────
function setMagnet(on) {
  magnetOn = on;
  btnMagnet.classList.toggle('on', on);
  // Cmd/Ctrl 누른 순간 마지막 마우스 위치 기준으로 즉시 스냅 재계산
  if (on && lastCrosshairParam?.point && lastCrosshairParam?.time) {
    const p = lastCrosshairParam;
    const snap = calcSnap(p.time, p.point.y);
    snapPoint = snap ? { time: p.time, price: snap.price, label: snap.label } : null;
    cursorPos = snap ? { time: p.time, price: snap.price }
                     : { time: p.time, price: series.coordinateToPrice(p.point.y) };
  } else {
    snapPoint = null;
  }
  drawCanvas();
}

document.addEventListener('keydown', e => {
  const isModifier = isMac ? e.key === 'Meta' : e.key === 'Control';
  if (isModifier) setMagnet(true);
  if (e.key === 'Escape') resetDraw(false);
});
document.addEventListener('keyup', e => {
  const isModifier = isMac ? e.key === 'Meta' : e.key === 'Control';
  if (isModifier) setMagnet(false);
});
btnMagnet.addEventListener('click', () => setMagnet(!magnetOn));

// ── Lightweight Charts ────────────────────────────────────────────────────
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout: { background: { color: '#1e2329' }, textColor: '#a0a0a0' },
  grid:   { vertLines: { color: '#2a3040' }, horzLines: { color: '#2a3040' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  timeScale: { borderColor: '#2a3040', timeVisible: false },
  rightPriceScale: { borderColor: '#2a3040' },
  width: wrapper.clientWidth, height: wrapper.clientHeight,
});
const series = chart.addCandlestickSeries({
  upColor: '#ef5350', downColor: '#26a69a',
  borderUpColor: '#ef5350', borderDownColor: '#26a69a',
  wickUpColor:   '#ef5350', wickDownColor:   '#26a69a',
});

// ── 캔버스 크기 동기화 ────────────────────────────────────────────────────
function syncSize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (!w || !h) return;
  canvas.width = w; canvas.height = h;
  chart.resize(w, h);
  drawCanvas();
}
new ResizeObserver(syncSize).observe(wrapper);
chart.timeScale().subscribeVisibleTimeRangeChange(drawCanvas);
requestAnimationFrame(syncSize);

// ── 데이터 로드 ───────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [ohlcvRes, chRes] = await Promise.all([
      fetch(`/ohlcv/${CODE}?days=3000`),
      fetch(`/channels/me?token=${TOKEN}&code=${CODE}`),
    ]);
    if (!ohlcvRes.ok) throw new Error('OHLCV 로드 실패');
    const ohlcv = await ohlcvRes.json();
    ohlcvData = {};
    for (const d of ohlcv) ohlcvData[d.time] = d;
    series.setData(ohlcv);
    if (ohlcv.length > 150)
      chart.timeScale().setVisibleLogicalRange({ from: ohlcv.length - 151, to: ohlcv.length - 1 });
    else
      chart.timeScale().fitContent();
    syncSize();
    titleEl.textContent = `${CODE} 채널 에디터`;
    savedChannels = chRes.ok ? await chRes.json() : [];
    renderChannelList();
    setStatus(`준비 완료. [채널 그리기]를 눌러 시작하세요. (수정 방법 → [?] 버튼)`);
  } catch (e) { setStatus(`❌ 로드 실패: ${e.message}`); }
}
loadAll();

// ── 패널 / 도움말 ─────────────────────────────────────────────────────────
let panelOpen = true;
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('panel-body').style.display = panelOpen ? '' : 'none';
  document.getElementById('panel-arrow').textContent  = panelOpen ? '▲' : '▼';
}
function toggleHelp() {
  document.getElementById('help-box').classList.toggle('show');
}

// ── 채널 목록 렌더링 ──────────────────────────────────────────────────────
function renderChannelList() {
  chList.innerHTML = '';
  chCount.textContent = savedChannels.length ? `(${savedChannels.length})` : '';
  if (!savedChannels.length) { panelEmpty.style.display = ''; return; }
  panelEmpty.style.display = 'none';
  savedChannels.forEach((ch, i) => {
    const color = PALETTE[i % PALETTE.length];
    const date  = new Date(ch.created_at * 1000).toLocaleDateString('ko-KR');
    const off   = ch.offset_y >= 0 ? `+${ch.offset_y.toFixed(0)}` : ch.offset_y.toFixed(0);
    const item  = document.createElement('div');
    item.className = 'ch-item';
    item.innerHTML = `
      <div class="ch-dot" style="background:${color}"></div>
      <div class="ch-info">채널 #${ch.id}<span>${date} | 오프셋 ${off}원</span></div>
      <button class="ch-del" onclick="deleteChannel(${ch.id})">🗑 삭제</button>
    `;
    chList.appendChild(item);
  });
  drawCanvas();
}

// ── CRUD ─────────────────────────────────────────────────────────────────
async function deleteChannel(id) {
  if (!confirm(`채널 #${id}을 삭제할까요?`)) return;
  try {
    const res = await fetch('/channels', {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, channel_id: id }),
    });
    if (!res.ok) throw new Error((await res.json()).detail);
    savedChannels = savedChannels.filter(c => c.id !== id);
    renderChannelList(); setStatus(`✅ 채널 #${id} 삭제 완료`);
  } catch (e) { alert(`삭제 실패: ${e.message}`); }
}

async function putChannel(ch) {
  const res = await fetch(`/channels/${ch.id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      token: TOKEN,
      p1_ts: ch.p1_ts, p1_price: ch.p1_price,
      p2_ts: ch.p2_ts, p2_price: ch.p2_price, offset_y: ch.offset_y,
    }),
  });
  if (!res.ok) throw new Error((await res.json()).detail ?? `HTTP ${res.status}`);
  return res.json();
}

// ── 버튼 ─────────────────────────────────────────────────────────────────
btnDraw.addEventListener('click', () => {
  if (state === 'idle' || state === 'done') {
    resetDraw(false); state = 'p1';
    btnDraw.textContent = '취소'; btnDraw.classList.add('active');
    btnReset.disabled = false;
    setStatus('① P1 클릭 (봉의 시/고/저/종에 스냅하려면 🧲 또는 ' + (isMac ? '⌘ Cmd' : 'Ctrl') + ')');
  } else { resetDraw(false); }
});
btnReset.addEventListener('click', () => resetDraw(false));
btnSave.addEventListener('click', saveChannel);

// ── 마그넷 스냅 계산 ──────────────────────────────────────────────────────
function calcSnap(time, mouseY) {
  if (!magnetOn || !time) return null;
  const key    = timeToKey(time);
  const candle = ohlcvData[key];
  if (!candle) return null;
  const levels = [
    { price: candle.high,  label: 'H' },
    { price: candle.low,   label: 'L' },
    { price: candle.open,  label: 'O' },
    { price: candle.close, label: 'C' },
  ];
  // 픽셀 거리 기준으로 가장 가까운 레벨
  return levels
    .map(l => ({ ...l, py: series.priceToCoordinate(l.price) }))
    .filter(l => l.py !== null)
    .reduce((a, b) => Math.abs(a.py - mouseY) < Math.abs(b.py - mouseY) ? a : b, null);
}

// ── 차트 이벤트 ───────────────────────────────────────────────────────────
chart.subscribeClick(param => { handleClick(param); });

async function handleClick(param) {
  if (!param.point) return;
  // cursorPos 우선 사용 — subscribeCrosshairMove에서 스냅 적용된 위치
  const time  = cursorPos?.time  ?? param.time;
  const price = cursorPos?.price ?? series.coordinateToPrice(param.point.y);
  if (price === null) return;

  // ── 편집 확정 ────────────────────────────────────────────────────────
  if (state === 'edit_point') {
    if (!time) return;
    const ch = { ...savedChannels[editTarget.idx] };
    if (editTarget.point === 'p1') { ch.p1_ts = toTs(time); ch.p1_price = price; }
    else                           { ch.p2_ts = toTs(time); ch.p2_price = price; }
    try {
      const updated = await putChannel(ch);
      savedChannels[editTarget.idx] = updated;
      renderChannelList();
      setStatus(`✅ 채널 #${ch.id} ${editTarget.point.toUpperCase()} 이동 완료`);
    } catch (e) { setStatus(`❌ 수정 실패: ${e.message}`); }
    editTarget = null; editPreview = null; state = 'idle';
    btnDraw.disabled = false; drawCanvas(); return;
  }

  // ── 호버 앵커 클릭 → 편집 시작 ──────────────────────────────────────
  if ((state === 'idle' || state === 'done') && hoverInfo) {
    editTarget = { idx: hoverInfo.idx, point: hoverInfo.point };
    hoverInfo  = null; state = 'edit_point';
    btnDraw.disabled = true; btnSave.disabled = true; btnReset.disabled = true;
    const chId = savedChannels[editTarget.idx].id;
    setStatus(`✏️ 채널 #${chId} ${editTarget.point.toUpperCase()} 이동 중 → 새 위치 클릭으로 확정 | ESC 취소`);
    drawCanvas(); return;
  }

  // ── 일반 그리기 ─────────────────────────────────────────────────────
  if (!time) return;
  if (state === 'p1') {
    p1 = { time, price }; state = 'p2';
    setStatus('② P2 클릭 (추세선 끝점)');
    drawCanvas();
  } else if (state === 'p2') {
    if (time === p1.time) return;
    p2 = { time, price }; state = 'offset';
    setStatus('③ 마우스로 하단 채널 폭 설정 → 클릭 확정');
    drawCanvas();
  } else if (state === 'offset') {
    const x1 = chart.timeScale().timeToCoordinate(p1.time);
    const y1 = series.priceToCoordinate(p1.price);
    const x2 = chart.timeScale().timeToCoordinate(p2.time);
    const y2 = series.priceToCoordinate(p2.price);
    if (x1 === null || y1 === null || x2 === null || y2 === null) return;
    // 미리보기와 동일한 방식으로 offset 계산 (마우스 x 기준)
    const dy = param.point.y - getYOnLine(x1, y1, x2, y2, param.point.x);
    const upperPrice = series.coordinateToPrice(getYOnLine(x1, y1, x2, y2, param.point.x));
    const lowerPrice = series.coordinateToPrice(getYOnLine(x1, y1, x2, y2, param.point.x) + dy);
    if (upperPrice === null || lowerPrice === null) return;
    offsetY = lowerPrice - upperPrice;
    state   = 'done';
    btnDraw.textContent = '채널 그리기'; btnDraw.classList.remove('active');
    btnSave.disabled = false; btnReset.disabled = false;
    setStatus(`✅ 채널 완성 (오프셋 ${offsetY.toFixed(0)}원) — [저장] 클릭`);
    drawCanvas();
  }
}

chart.subscribeCrosshairMove(param => {
  lastCrosshairParam = param; // 항상 최신 파라미터 보관
  if (!param.point) {
    lastPxPos = null;
    snapPoint = null; cursorPos = null; hoverInfo = null;
    editPreview = null; drawCanvas(); return;
  }
  lastPxPos = { x: param.point.x, y: param.point.y }; // 원시 픽셀 좌표 저장
  const rawPrice = series.coordinateToPrice(param.point.y);

  // 마그넷 스냅 계산 (항상)
  if (param.time) {
    const snap = calcSnap(param.time, param.point.y);
    snapPoint = snap ? { time: param.time, price: snap.price, label: snap.label } : null;
    cursorPos = snapPoint ? { time: param.time, price: snap.price }
                          : { time: param.time, price: rawPrice };
  } else {
    snapPoint = null; cursorPos = rawPrice !== null ? { time: null, price: rawPrice } : null;
  }

  // 편집 미리보기
  if (state === 'edit_point' && cursorPos?.time) {
    editPreview = { ...cursorPos }; drawCanvas(); return;
  }
  // offset 미리보기
  if (state === 'offset') { drawCanvas(); return; }

  // 호버 감지
  if (state === 'idle' || state === 'done') {
    hoverInfo = null;
    for (let i = 0; i < savedChannels.length; i++) {
      const ch = savedChannels[i];
      const x1 = chart.timeScale().timeToCoordinate(tsToStr(ch.p1_ts));
      const y1 = series.priceToCoordinate(ch.p1_price);
      const x2 = chart.timeScale().timeToCoordinate(tsToStr(ch.p2_ts));
      const y2 = series.priceToCoordinate(ch.p2_price);
      if (x1 !== null && y1 !== null && dist(param.point.x, param.point.y, x1, y1) < HIT_PX) {
        hoverInfo = { idx: i, point: 'p1', ch }; break;
      }
      if (x2 !== null && y2 !== null && dist(param.point.x, param.point.y, x2, y2) < HIT_PX) {
        hoverInfo = { idx: i, point: 'p2', ch }; break;
      }
    }
    if (hoverInfo) {
      setStatus(`✏️ ${hoverInfo.point.toUpperCase()} 앵커 클릭 → 이동 모드`);
    }
  }
  drawCanvas();
});

// ── 렌더링 ───────────────────────────────────────────────────────────────
function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 저장된 채널
  savedChannels.forEach((ch, i) => {
    const isEdit = editTarget?.idx === i;
    drawSavedChannel(ch, PALETTE[i % PALETTE.length], isEdit ? 0.2 : 0.55);
  });

  // 편집 미리보기
  if (state === 'edit_point' && editTarget !== null) {
    const ch    = savedChannels[editTarget.idx];
    const color = PALETTE[editTarget.idx % PALETTE.length];
    const preview = editPreview ?? {
      time: tsToStr(editTarget.point === 'p1' ? ch.p1_ts : ch.p2_ts),
      price: editTarget.point === 'p1' ? ch.p1_price : ch.p2_price,
    };
    const aTime  = tsToStr(editTarget.point === 'p1' ? ch.p2_ts : ch.p1_ts);
    const aPrice = editTarget.point === 'p1' ? ch.p2_price : ch.p1_price;
    const ax = chart.timeScale().timeToCoordinate(aTime);
    const ay = series.priceToCoordinate(aPrice);
    const ex = chart.timeScale().timeToCoordinate(preview.time);
    const ey = series.priceToCoordinate(preview.price);
    if (ax !== null && ay !== null && ex !== null && ey !== null) {
      const [lx,ly,rx,ry] = editTarget.point==='p1' ? [ex,ey,ax,ay] : [ax,ay,ex,ey];
      const offA = priceDiffToPx(ch.offset_y, aPrice);
      const offE = priceDiffToPx(ch.offset_y, preview.price);
      extendLine(lx, ly, rx, ry, color, false, 0.9);
      if (offA!==null && offE!==null) {
        const [ofl, ofr] = editTarget.point==='p1' ? [offE,offA] : [offA,offE];
        extendLine(lx, ly+ofl, rx, ry+ofr, color, true, 0.9);
      }
      drawDot(ex, ey, '#ffeb3b', 7);
    }
  }

  // 호버 앵커
  if (hoverInfo) {
    const ch = hoverInfo.ch;
    const ts = hoverInfo.point === 'p1' ? ch.p1_ts : ch.p2_ts;
    const pr = hoverInfo.point === 'p1' ? ch.p1_price : ch.p2_price;
    const hx = chart.timeScale().timeToCoordinate(tsToStr(ts));
    const hy = series.priceToCoordinate(pr);
    if (hx !== null && hy !== null) {
      drawDot(hx, hy, '#ffeb3b', 9);
      // 풍선 라벨
      const label = `클릭: ${hoverInfo.point.toUpperCase()} 이동`;
      ctx.save();
      ctx.font = 'bold 11px sans-serif';
      const tw = ctx.measureText(label).width;
      const lx = hx + 14, ly = hy - 18;
      ctx.fillStyle = 'rgba(20,25,32,0.88)';
      roundRect(lx - 4, ly - 12, tw + 12, 18, 4);
      ctx.fill();
      ctx.fillStyle = '#ffeb3b';
      ctx.fillText(label, lx, ly);
      ctx.restore();
    }
  }

  // 마그넷 스냅 표시
  if (snapPoint && magnetOn) {
    const sx = chart.timeScale().timeToCoordinate(snapPoint.time);
    const sy = series.priceToCoordinate(snapPoint.price);
    if (sx !== null && sy !== null) {
      ctx.save();
      ctx.strokeStyle = '#ffc107'; ctx.lineWidth = 1; ctx.setLineDash([4,4]); ctx.globalAlpha = 0.55;
      ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;
      ctx.fillStyle = '#ffc107'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#111'; ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(snapPoint.label, sx, sy);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.restore();
    }
  }

  // 현재 그리는 채널 + 커서 미리보기
  const drawingActive = state === 'p1' || state === 'p2' || state === 'offset' || state === 'done';
  if (!drawingActive) return;

  // 커서 미리보기 점
  if ((state === 'p1' || state === 'p2') && cursorPos?.time) {
    const cx = chart.timeScale().timeToCoordinate(cursorPos.time);
    const cy = series.priceToCoordinate(cursorPos.price);
    if (cx !== null && cy !== null) {
      ctx.save(); ctx.globalAlpha = 0.5;
      drawDot(cx, cy, '#4fc3f7', 5);
      ctx.restore();
    }
  }

  if (!p1) return;
  const x1 = chart.timeScale().timeToCoordinate(p1.time);
  const y1 = series.priceToCoordinate(p1.price);
  if (x1 === null || y1 === null) return;
  drawDot(x1, y1, '#4fc3f7', 5);

  // P2 상태: p1 → 커서 미리보기 선
  if (state === 'p2' && cursorPos?.time) {
    const cx = chart.timeScale().timeToCoordinate(cursorPos.time);
    const cy = series.priceToCoordinate(cursorPos.price);
    if (cx !== null && cy !== null && cx !== x1) {
      ctx.save(); ctx.globalAlpha = 0.4;
      extendLine(x1, y1, cx, cy, '#4fc3f7', false, 0.4);
      ctx.restore();
    }
  }

  if (!p2) return;
  const x2 = chart.timeScale().timeToCoordinate(p2.time);
  const y2 = series.priceToCoordinate(p2.price);
  if (x2 === null || y2 === null) return;
  drawDot(x2, y2, '#4fc3f7', 5);
  extendLine(x1, y1, x2, y2, '#4fc3f7', false, 0.9);

  if (state === 'offset' && lastPxPos) {
    // 마우스 실제 x 위치에서의 상단선 y를 구해 offset 계산 → 선이 마우스를 정확히 통과
    const dy = lastPxPos.y - getYOnLine(x1, y1, x2, y2, lastPxPos.x);
    extendLine(x1, y1+dy, x2, y2+dy, '#4fc3f7', true, 0.9);
  } else if (state === 'done') {
    const offPx = priceDiffToPx(offsetY, p1.price);
    if (offPx !== null) extendLine(x1, y1+offPx, x2, y2+offPx, '#4fc3f7', true, 0.9);
  }
}

function drawSavedChannel(ch, color, alpha) {
  const x1 = chart.timeScale().timeToCoordinate(tsToStr(ch.p1_ts));
  const y1 = series.priceToCoordinate(ch.p1_price);
  const x2 = chart.timeScale().timeToCoordinate(tsToStr(ch.p2_ts));
  const y2 = series.priceToCoordinate(ch.p2_price);
  if (x1===null||y1===null||x2===null||y2===null) return;
  extendLine(x1,y1,x2,y2, color, false, alpha);
  const offPx = priceDiffToPx(ch.offset_y, ch.p1_price);
  if (offPx !== null) extendLine(x1,y1+offPx,x2,y2+offPx, color, true, alpha);
  drawDot(x1,y1, color, 4); drawDot(x2,y2, color, 4);
}

// ── 저장 ─────────────────────────────────────────────────────────────────
async function saveChannel() {
  if (!p1||!p2) return;
  btnSave.disabled = true; setStatus('저장 중…');
  try {
    const res = await fetch('/channels', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: TOKEN, stock_code: CODE,
        p1_ts: toTs(p1.time), p1_price: p1.price,
        p2_ts: toTs(p2.time), p2_price: p2.price, offset_y: offsetY,
      }),
    });
    if (!res.ok) throw new Error((await res.json()).detail ?? `HTTP ${res.status}`);
    const saved = await res.json();
    savedChannels.push(saved); renderChannelList();
    resetDraw(true);
    setStatus(`✅ 채널 #${saved.id} 저장 완료! 계속 그릴 수 있습니다.`);
  } catch (e) { setStatus(`❌ 저장 실패: ${e.message}`); btnSave.disabled = false; }
}

// ── 초기화 ───────────────────────────────────────────────────────────────
function resetDraw(keepStatus = false) {
  state = 'idle'; p1=p2=null; offsetY=0;
  snapPoint=null; cursorPos=null; lastPxPos=null; hoverInfo=null; editTarget=null; editPreview=null;
  btnDraw.textContent='채널 그리기'; btnDraw.classList.remove('active');
  btnDraw.disabled=false; btnSave.disabled=true; btnReset.disabled=true;
  if (!keepStatus) setStatus('준비. [채널 그리기]를 눌러 시작 | 저장된 채널 앵커 위에 마우스 → 수정 가능');
  drawCanvas();
}

// ── 헬퍼 ─────────────────────────────────────────────────────────────────
function timeToKey(t) {
  if (typeof t === 'string') return t;
  if (typeof t === 'number') return tsToStr(t);
  return `${t.year}-${String(t.month).padStart(2,'0')}-${String(t.day).padStart(2,'0')}`;
}
function tsToStr(ts) {
  const d = new Date(ts * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function toTs(t) {
  if (typeof t === 'number') return t;
  return new Date(timeToKey(t) + 'T00:00:00Z').getTime() / 1000;
}
function dist(x1,y1,x2,y2) { return Math.hypot(x2-x1,y2-y1); }
function getYOnLine(x1,y1,x2,y2,x) {
  if (x2===x1) return y1;
  return y1 + (y2-y1)*(x-x1)/(x2-x1);
}
function priceDiffToPx(diff, ref) {
  const a = series.priceToCoordinate(ref);
  const b = series.priceToCoordinate(ref+diff);
  return (a===null||b===null) ? null : b-a;
}
function extendLine(x1,y1,x2,y2, color, dashed, alpha=0.9) {
  if (x1===x2) return;
  const s = (y2-y1)/(x2-x1);
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.globalAlpha=alpha;
  ctx.setLineDash(dashed?[8,5]:[]);
  ctx.beginPath();
  ctx.moveTo(0, y1-s*x1); ctx.lineTo(canvas.width, y1+s*(canvas.width-x1));
  ctx.stroke(); ctx.restore();
}
function drawDot(x,y,color,r=5) {
  ctx.save();
  ctx.fillStyle=color; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.restore();
}
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}
function setStatus(msg) { statusEl.textContent = msg; }
</script>
